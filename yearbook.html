<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ANHS Live — Yearbook</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="firebase-config.js"></script>

        <link rel="stylesheet" href="style.css?v=3">
    </head>
    <body>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header: status + title -->
            <div class="page-header">
                <span id="yb-status-badge" class="status-badge status-locked">Loading...</span>
                <h1>Guess That Teacher!</h1>
            </div>

            <!-- Content: game phases -->
            <div class="content-panel" style="text-align: center;">

                <!-- Phase: waiting -->
                <div id="yb-waiting" style="padding: 2rem 0;">
                    <p style="color: var(--text-muted); font-size: 1.1rem;">Stand by — the next round is about to start.</p>
                </div>

                <!-- Phase: guessing -->
                <div id="yb-guessing" style="display: none;">
                    <h2 style="margin-bottom: 1rem;">Who is this?</h2>
                    <div class="yb-throwback-card">
                        <img id="yb-throwback-img" src="" alt="Who is this teacher?">
                    </div>
                    <div id="yb-options-grid" class="yb-options-grid"></div>
                </div>

                <!-- Phase: reveal -->
                <div id="yb-reveal" style="display: none;">
                    <span id="yb-result-chip" class="yb-result-chip"></span>
                    <h2 id="yb-reveal-name" style="font-size: 1.75rem; margin-bottom: 1rem;"></h2>
                    <div class="yb-reveal-photos">
                        <div class="yb-reveal-photo">
                            <img id="yb-reveal-throwback" src="" alt="Then">
                            <p>Then</p>
                        </div>
                        <div class="yb-reveal-photo">
                            <img id="yb-reveal-current" src="" alt="Now">
                            <p>Now</p>
                        </div>
                    </div>
                    <div id="yb-vote-bars" style="max-width: 480px; margin: 1rem auto 0;"></div>
                    <div id="yb-reveal-scores" style="margin-top: 1.5rem;"></div>
                </div>

            </div>

        </div>

        <!-- Rank Modal (shown for top 3 when round ends) -->
        <div id="yb-rank-modal" class="modal" onclick="this.style.display='none'" style="display:none;">
            <div class="modal-content" style="text-align:center; max-width:320px;">
                <div class="rank-modal-emoji" style="font-size:4rem; margin-bottom:1rem;"></div>
                <h2 class="rank-modal-place" style="font-size:2.5rem; margin-bottom:0.5rem;"></h2>
                <p id="yb-rank-modal-msg" style="color:var(--text-muted);"></p>
                <p style="color:var(--text-muted); font-size:0.85rem; margin-top:1rem;">Tap to dismiss</p>
            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Data + Logic -->
        <script src="yearbook-data.js"></script>
        <script src="common.js"></script>
    </body>
</html>
