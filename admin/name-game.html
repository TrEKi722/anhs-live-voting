<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin — Name Game</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="../style.css">
    </head>
    <body>

        <nav>
            <a href="/admin">← Admin</a>
        </nav>

        <div id="adminDash" style="display: none; flex-direction: column; align-items: center; margin-top: 5rem; padding-top: 1rem;">
            <h1>Name Game</h1>
            <div class="admin-panel" style="margin-top: 1rem;">
                <h3>Game Controls</h3>

                <div id="ng-setup" style="margin: 1rem 0;">
                    <div style="display: flex; flex-direction: column; gap: 0.75rem; align-items: center;">
                        <div>
                            <label style="display: block; margin-bottom: 0.25rem; font-size: 0.9rem; color: var(--text-muted);">Image Set</label>
                            <select id="ng-set-select" style="padding: 0.6rem 1rem; background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--card-border); border-radius: 8px; font-size: 1rem;">
                                <!-- Populated by updateNGAdminUI() -->
                            </select>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.25rem; font-size: 0.9rem; color: var(--text-muted);">Duration (seconds)</label>
                            <input type="number" id="ng-duration-input" value="10" min="5" max="300"
                                style="padding: 0.6rem 1rem; background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--card-border); border-radius: 8px; font-size: 1rem; width: 100px; text-align: center;">
                        </div>
                    </div>
                </div>

                <button id="ng-start-btn" class="action-btn btn-primary" onclick="ngPrepareStart();openModal('ngStartModal')">Start Round</button>
                <button id="ng-end-btn" class="action-btn btn-danger" onclick="ngEndRound()" style="display: none;">End Round</button>
                <button class="action-btn btn-danger" style="background: #000;" onclick="openModal('ngResetModal')">Reset</button>

                <div class="modal" id="ngStartModal">
                    <h1>Start Name Game round?</h1>
                    <p id="ng-start-confirm-text" style="margin-bottom: 20px;"></p>
                    <button class="action-btn btn-primary" onclick="ngStartRound();closeModal('ngStartModal');">Yes, Start</button>
                    <button class="action-btn btn-secondary" onclick="closeModal('ngStartModal');">Cancel</button>
                </div>

                <div class="modal" id="ngResetModal">
                    <h1>Reset the Name Game?</h1>
                    <p style="margin-bottom: 20px;">This will clear all scores and end any active round.</p>
                    <button class="action-btn btn-secondary" onclick="closeModal('ngResetModal');">Cancel</button>
                    <button class="action-btn btn-danger" onclick="ngReset();closeModal('ngResetModal');">Yes, Reset</button>
                </div>
            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="../name-game-data.js"></script>
        <script src="../common.js"></script>
        <script src="../61646D696E64617368.js"></script>
    </body>
</html>
