<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>ANHS Live — Find Wally!</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="firebase-config.js"></script>

        <link rel="stylesheet" href="style.css?v=3">
        <style>
            /* Wally page must fill the full viewport so the image area has real height */
            body { height: 100dvh; overflow: hidden; }
            .page-layout { height: 100%; overflow: hidden; }
        </style>
    </head>
    <body>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header -->
            <div class="page-header">
                <span id="wally-status-badge" class="status-badge status-locked">Loading...</span>
                <h1>Find Wally!</h1>
            </div>

            <!-- State: waiting -->
            <div id="wally-waiting" class="content-panel" style="text-align: center;">
                <p style="color: var(--text-muted); font-size: 1.1rem;">Stand by — the round is about to start.</p>
            </div>

            <!-- State: round ended without finding -->
            <div id="wally-ended" class="content-panel" style="display: none; text-align: center;">
                <p style="color: var(--text-muted); font-size: 1.1rem;">Round over — better luck next time!</p>
                <div id="wally-ended-scores" style="margin-top: 1.5rem;"></div>
            </div>

            <!-- State: hunting -->
            <div id="wally-active">
                <div id="wally-stopwatch-bar">
                    <span id="wally-stopwatch">0.00s</span>
                </div>
                <div id="wally-image-viewport">
                    <div id="wally-image-wrapper">
                        <img id="wally-img" src="" alt="Find Wally!">
                    </div>
                    <div id="wally-loading">Loading scene...</div>
                </div>
            </div>

            <!-- State: found -->
            <div id="wally-found" class="content-panel">
                <h2>Found him!</h2>
                <p id="wally-your-time"></p>
                <p id="wally-your-rank"></p>
                <div id="wally-top3"></div>
            </div>

        </div>

        <!-- Rank Modal (shown when round ends for top 3) -->
        <div id="wally-rank-modal" class="modal" onclick="this.style.display='none'" style="display:none;">
            <div class="modal-content" style="text-align:center; max-width:320px;">
                <div class="rank-modal-emoji" style="font-size:4rem; margin-bottom:1rem;"></div>
                <h2 class="rank-modal-place" style="font-size:2.5rem; margin-bottom:0.5rem;"></h2>
                <p style="color:var(--text-muted);">You found Wally!</p>
                <p class="rank-modal-crumbl" style="display:none; color:var(--primary); font-weight:bold; margin-top:0.75rem;">Claim your Crumbl after the rally!</p>
                <p style="color:var(--text-muted); font-size:0.85rem; margin-top:1rem;">Tap to dismiss</p>
            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Data + Logic -->
        <script src="wally-data.js"></script>
        <script src="common.js"></script>
    </body>
</html>
