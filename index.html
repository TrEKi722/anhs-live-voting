<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANHS Live Polling</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="view-vote" class="view">
        <div style="text-align: center;">
            <div id="vote-status-badge" class="status-badge status-open">Loading status...</div>
        </div>
        <h1>WHICH VIDEO WAS THE BEST?!</h1>
    </div>

    <div class="chart-container">
        <div class="options-grid">
            <button class="vote-btn" data-option="0">
                <div class="bar-label"><span id="option0">FRESHMEN</span> <span id="pct-0">0%</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
            </button>
            <button class="vote-btn" data-option="1">
                <div class="bar-label"><span id="option1">SOPHOMORES</span> <span id="pct-1">0%</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
            </button>
            <button class="vote-btn" data-option="2">
                <div class="bar-label"><span id="option2">JUNIORS</span> <span id="pct-2">0%</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
            </button>
            <button class="vote-btn" data-option="3">
                <div class="bar-label"><span id="option3">SENIORS</span> <span id="pct-3">0%</span></div>
                <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
            </button>
        </div>
        <div class="options-grid hidden">
            <button class="vote-btn" data-option="0">
                <div class="bar-label"><span id="option0b">FRESHMEN</span></div>
            </button>
            <button class="vote-btn" data-option="1">
                <div class="bar-label"><span id="option1b">SOPHOMORES</span></div>
            </button>
            <button class="vote-btn" data-option="2">
                <div class="bar-label"><span id="option2b">JUNIORS</span></div>
            </button>
            <button class="vote-btn" data-option="3">
                <div class="bar-label"><span id="option3b">SENIORS</span></div>
            </button>
        </div>
    </div>

    <!-- Custom Toast Message -->
    <div id="toast">Message goes here</div>

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>
</html>
