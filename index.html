<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANHS Live Polling</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="view-vote" class="view">
        <div style="text-align: center;">
            <div id="vote-status-badge" class="status-badge status-open">Loading status...</div>
        </div>
        <h1>WHICH VIDEO WAS THE BEST?!</h1>
    </div>

    <div class="chart-container">
        <button class="vote-btn" data-option="0">
            <div class="bar-label"><span>FRESHMEN</span> <span id="pct-0">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
        </button>
        <button class="vote-btn" data-option="1">
            <div class="bar-label"><span>SOPHOMORES</span> <span id="pct-1">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
        </button>
        <button class="vote-btn" data-option="2">
            <div class="bar-label"><span>JUNIORS</span> <span id="pct-2">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
        </button>
        <button class="vote-btn" data-option="3">
            <div class="bar-label"><span>SENIORS</span> <span id="pct-3">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
        </button>
        
        <!-- <div class="total-participants">
            Total Votes: <span id="total-count">0</span> -->
    </div>

    <!-- Custom Toast Message -->
    <div id="toast">Message goes here</div>

    <!-- Application Logic -->
    <script>
        // ==========================================
        // 1. Initialization & Config
        // ==========================================
        const SUPABASE_URL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State Variables
        let currentUser = null;
        let pollIsLocked = false;
        let myVote = null; 
        let isAdmin = false;

        // ==========================================
        // 2. Authentication
        // ==========================================
        async function initAuth() {
            try {
                // Check for existing session
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) {
                    currentUser = session.user;
                    // If the user logged in with an email, they are an admin
                    if (currentUser.email) {
                        isAdmin = true;
                    } else {
                        isAdmin = false;
                    }
                } else {
                    // Sign in anonymously for voters
                    const { data, error } = await supabaseClient.auth.signInAnonymously();
                    if (error) throw error;
                    currentUser = data.user;
                    isAdmin = false;
                }
                
                console.log("Authenticated as:", currentUser.id, isAdmin ? "(Admin)" : "(Voter)");
                fetchInitialData();
                setupRealtimeSubscriptions();

            } catch (error) {
                console.error("Auth error:", error);
                showToast("Authentication failed. Check console.");
            }
        }

        // ==========================================
        // 3. Database Operations & Realtime
        // ==========================================
        async function fetchInitialData() {
            // Fetch Poll Status
            const { data: configData } = await supabaseClient
                .from('poll_config')
                .select('is_locked')
                .eq('id', 'main')
                .single();
            
            if (configData) {
                pollIsLocked = configData.is_locked;
            }

            // Fetch My Vote
            if (currentUser) {
                const { data: myVoteData } = await supabaseClient
                    .from('votes')
                    .select('option_index')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (myVoteData) {
                    myVote = myVoteData.option_index;
                } else {
                    myVote = null;
                }
            }

            updateVoteUI();
            fetchAndUpdateAllVotes();
        }

        async function fetchAndUpdateAllVotes() {
            const { data: votes, error } = await supabaseClient
                .from('votes')
                .select('option_index');

            if (error) {
                console.error("Error fetching votes:", error);
                return;
            }

            let voteCounts = [0, 0, 0, 0];
            let totalVotes = 0;

            if (votes) {
                votes.forEach(v => {
                    if (v.option_index >= 0 && v.option_index <= 3) {
                        voteCounts[v.option_index]++;
                        totalVotes++;
                    }
                });
            }

            updateProjectorUI(voteCounts, totalVotes);
        }

        function setupRealtimeSubscriptions() {
            // Listen to Poll Config (Locking/Unlocking)
            supabaseClient
                .channel('poll-config-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'poll_config' }, payload => {
                    console.log('Poll config changed:', payload);
                    if (payload.new && payload.new.is_locked !== undefined) {
                        pollIsLocked = payload.new.is_locked;
                        updateVoteUI();
                    }
                })
                .subscribe();

            // Listen to Votes (For the Projector)
            supabaseClient
                .channel('votes-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, payload => {
                    console.log('Votes changed:', payload);
                    // Just re-fetch totals to keep calculations perfectly accurate
                    fetchAndUpdateAllVotes();
                    
                    // Update myVote status if my row was deleted (e.g. admin reset)
                    if (payload.eventType === 'DELETE' && currentUser && payload.old.user_id === currentUser.id) {
                        myVote = null;
                        updateVoteUI();
                    }
                })
                .subscribe();
        }

        // ==========================================
        // 4. UI Update Functions
        // ==========================================
     
        function updateVoteUI() {
            const badge = document.getElementById('vote-status-badge');
            const buttons = document.querySelectorAll('.vote-btn');

            if (pollIsLocked) {
                badge.className = 'status-badge status-locked';
                badge.innerText = '🔒 Voting is Locked';
            } else {
                badge.className = 'status-badge status-open';
                badge.innerText = '🟢 Voting is Open';
            }

            buttons.forEach((btn, index) => {
                btn.classList.remove('selected');
                
                if (myVote !== null) {
                    btn.disabled = true;
                    if (myVote === index) btn.classList.add('selected');
                } else if (pollIsLocked) {
                    btn.disabled = true;
                } else {
                    btn.disabled = false;
                }
            });
        }

        // Animate the bars and update text
        function updateProjectorUI(counts, total) {
            // document.getElementById('total-count').innerText = total;

            counts.forEach((count, index) => {
                const percentage = total === 0 ? 0 : Math.round((count / total) * 100);
                document.getElementById(`bar-${index}`).style.width = `${percentage}%`;
                document.getElementById(`pct-${index}`).innerText = `${percentage}%`;
            });
        }

        // ==========================================
        // 5. User Actions
        // ==========================================
        
        // Handle Voting
        document.querySelectorAll('.vote-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (!currentUser) return showToast("Not authenticated yet.");
                if (pollIsLocked) return showToast("Voting is currently locked.");
                if (myVote !== null) return showToast("You have already voted!");

                const optionIndex = parseInt(btn.dataset.option);                
                
                try {
                    // UPSERT logic: Insert vote, or update if user_id exists
                    const { error } = await supabaseClient
                        .from('votes')
                        .upsert({ user_id: currentUser.id, option_index: optionIndex });
                        
                    if (error) throw error;

                    myVote = optionIndex;
                    updateVoteUI();
                    showToast("Vote cast successfully!");

                } catch (error) {
                    console.error("Voting error:", error);
                    showToast("Error casting vote.");
                }
            });
        });

        // ==========================================
        // 6. Router & Utilities
        // ==========================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        initAuth();

    </script>
</body>
</html>
