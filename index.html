<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ANHS Live Polling</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">
        
        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div id="auth-container" style="display: none; flex-direction: column; align-items: center; gap: 1rem; margin-top: 4rem; text-align: center;">
            <h2>Sign in to vote</h2>
            <p style="color: #6b7280; max-width: 300px;">Create an account with any of the following to vote. One vote per person.</p>
            <button class="action-btn btn-primary" onclick="signInWithGoogle()" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1rem;">
                <img src="https://www.google.com/favicon.ico" style="width:18px;height:18px;"> Sign in with Google
            </button>
            <!-- <button class="action-btn btn-primary" onclick="signInWithApple()" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1rem;">
                <img src="https://www.apple.com/favicon.ico" style="width:18px;height:18px;"> Sign in with Apple
            </button> -->
            <button class="action-btn btn-primary" onclick="signInWithMicrosoft()" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1rem; background: #2f6fba;">
                <img src="https://microsoft.com/favicon.ico" style="width:18px;height:18px;"> Sign in with Microsoft
            </button>
            <!-- <button onclick="showAnonymousFallback()" style="background:none; border:none; color:#6b7280; cursor:pointer; font-size:0.85rem; text-decoration:underline;">
                Skip (vote anonymously)
            </button> -->
        </div>

        <div id="turnstile-container" style="display: none; text-align: center; margin-top: 50px;">
            <h2>Please complete the CAPTCHA to vote</h2>
            <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAACp4ciLpxF9JPdqQ"
            data-theme="light"
            data-size="normal"
            data-callback="initAuth"
            ></div>
        </div>

        <nav id="admin-nav" style="display:none;">
            <a href="./" id="nav-vote">📱 Vote</a>
            <a href="/wall" id="nav-live">📊 Live View</a>
            <a href="/admin" id="nav-admin">⚙️ Admin Dashboard</a>
        </nav>

        <div id="full-page" style="display: none;">



            <div id="view-vote" class="view">
                <div style="text-align: center;">
                    <div id="locked-status-badge" class="status-badge status-open">Loading status...</div>
                </div>                
                <div id="hidden-status-badge" style="text-align: center; display: none;">
                    <div class="status-badge status-locked">🙈 Results Hidden 🙈</div>
                </div>
                <h1 id="question">WHICH VIDEO WAS THE BEST?!</h1>
            </div>

            <div class="chart-container">
                <div class="options-grid" id="resultGrid">
                    <button class="vote-btn" data-option="0">
                        <div class="bar-label"><span id="option0">FRESHMEN</span> <span id="pct-0">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
                    </button>
                    <button class="vote-btn" data-option="1">
                        <div class="bar-label"><span id="option1">SOPHOMORES</span> <span id="pct-1">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
                    </button>
                    <button class="vote-btn" data-option="2">
                        <div class="bar-label"><span id="option2">JUNIORS</span> <span id="pct-2">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
                    </button>
                    <button class="vote-btn" data-option="3">
                        <div class="bar-label"><span id="option3">SENIORS</span> <span id="pct-3">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
                    </button>
                </div>
                <div class="options-grid hidden" id="hiddenGrid">
                    <button class="vote-btn" data-option="0">
                        <div class="bar-label"><span id="option0b">FRESHMEN</span></div>
                    </button>
                    <button class="vote-btn" data-option="1">
                        <div class="bar-label"><span id="option1b">SOPHOMORES</span></div>
                    </button>
                    <button class="vote-btn" data-option="2">
                        <div class="bar-label"><span id="option2b">JUNIORS</span></div>
                    </button>
                    <button class="vote-btn" data-option="3">
                        <div class="bar-label"><span id="option3b">SENIORS</span></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="script.js"></script>
    </body>
</html>
