<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ANHS Live - Name Game</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="firebase-config.js"></script>

        <link rel="stylesheet" href="style.css?v=3">
    </head>
    <body>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header: status + title + timer -->
            <div class="page-header">
                <div id="ng-phase-badge" class="status-badge status-locked">Waiting for round to start...</div>
                <h1>Name Game</h1>
                <div id="ng-timer-section" style="display: none; margin-top: 0.75rem; max-width: 400px; margin-left: auto; margin-right: auto;">
                    <div class="ng-timer-track">
                        <div id="ng-timer-bar" class="ng-timer-bar"></div>
                    </div>
                    <div id="ng-timer-text" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;"></div>
                </div>
            </div>

            <!-- Content: game phases -->
            <div class="content-panel">

                <!-- Idle -->
                <div id="ng-idle" style="text-align: center; padding: 2rem 0;">
                    <p style="color: var(--text-muted); font-size: 1.1rem;">Get ready to memorize as many images as you can!</p>
                </div>

                <!-- Memorize: image grid -->
                <div id="ng-memorize" style="display: none;">
                    <p style="text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.75rem;">Study these images — you'll name them from memory!</p>
                    <div id="ng-memorize-grid" class="ng-image-grid"></div>
                </div>

                <!-- Recall: text input -->
                <div id="ng-recall" style="display: none; text-align: center;">
                    <div id="ng-score-display" style="font-size: 2rem; font-weight: bold; margin-bottom: 1rem;">Score: 0</div>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem;">Type any image name you remember and press Enter!</p>
                    <input
                        type="text"
                        id="ng-input"
                        class="ng-input"
                        placeholder="Type a name..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        onkeydown="if(event.key==='Enter') submitNGAnswer()"
                        style="width: 100%; box-sizing: border-box;"
                    >
                    <div id="ng-feedback" class="ng-feedback"></div>
                </div>

                <!-- Done -->
                <div id="ng-done" style="display: none; text-align: center; padding: 2rem 0;">
                    <h2 id="ng-final-score" style="font-size: 2.5rem; margin-bottom: 0.5rem;"></h2>
                    <p style="color: var(--text-muted);">Great effort!</p>
                </div>

            </div>

        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="name-game-data.js"></script>
        <script src="common.js"></script>
    </body>
</html>
