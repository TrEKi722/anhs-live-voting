<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        
        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        
        <link rel="stylesheet" href="style.css">

        <!-- Cloudflare Turnstile -->
        <link rel="preconnect" href="https://challenges.cloudflare.com">
        <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer
        ></script>
    </head>
    <body>

        <div id="turnstile-container" style="display: block; text-align: center; margin-top: 50px;">
            <h2>Please complete the CAPTCHA to continue</h2>
            <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAACp4ciLpxF9JPdqQ"
            data-theme="light"
            data-size="normal"
            data-callback="initAuth"
            ></div>
        </div>

        <div id="full-page" style="display:none;">
            <h1>Admin Dashboard</h1>
            <div class="admin-panel">
                
                <div id="admin-login-ui" class="admin-login">
                    <p>Sign in to access controls.</p>
                    <input type="email" id="admin-email" placeholder="Admin Email">
                    <input type="password" id="admin-pass" placeholder="Password">
                    <button class="action-btn btn-primary" onclick="loginAdmin()">Sign In</button>
                </div>

                <div id="admin-controls-ui" class="admin-controls">
                    <div style="margin-bottom: 2rem;">
                        <h3>Poll Status</h3>
                        <button id="toggle-lock-btn" class="action-btn btn-danger" onclick="toggleLock()">
                            🔒 Lock Voting
                        </button>
                        <button id="toggle-hide-btn" class="action-btn btn-danger" onclick="toggleHide()">
                            🙈 Hide Results
                        </button>
                    </div>
                    
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 1rem 0;">
                    
                    <div>
                        <h3>Danger Zone</h3>
                        <button class="action-btn btn-danger" style="background: #000;" onclick="resetPoll()">
                            ⚠️ Reset Poll (Clear All Votes)
                        </button>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button class="action-btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;" onclick="logoutAdmin()">
                            Log Out
                        </button>
                    </div>

                    <div class="admin-edit-ui">
                        <h3>Edit</h3>
                        <input type="text" id="editOption0" placeholder="Option 1 Text">
                        <input type="text" id="editOption1" placeholder="Option 2 Text">
                        <input type="text" id="editOption2" placeholder="Option 3 Text">
                        <input type="text" id="editOption3" placeholder="Option 4 Text">
                        <button class="action-btn btn-primary" style="margin-top: 0.5rem;" onclick="updateOptions(['editOption0','editOption1','editOption2','editOption3'])">Update Options</button>
                    </div>

                    <div class="chart-container" style="width: auto;">
                        <h2>Current Poll Resutls</h2>
                        <div class="bar-group">
                            <div class="bar-label"><span id="option0">FRESHMEN</span> <span id="pct-0">0%</span></div>
                            <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
                        </div>
                        <div class="bar-group">
                            <div class="bar-label"><span id="option1">SOPHOMORES</span> <span id="pct-1">0%</span></div>
                            <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
                        </div>
                        <div class="bar-group">
                            <div class="bar-label"><span id="option2">JUNIORS</span> <span id="pct-2">0%</span></div>
                            <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
                        </div>
                        <div class="bar-group">
                            <div class="bar-label"><span id="option3">SENIORS</span> <span id="pct-3">0%</span></div>
                            <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
                        </div>

                        <div class="total-participants">
                            Total Votes: <span id="total-count">0</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="script.js"></script>

    </body>
</html>
