<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Admin Content -->
    <div>
        <h1>Admin Dashboard</h1>
        <div class="admin-panel">
            
            <div id="admin-login-ui" class="admin-login">
                <p>Sign in to access controls.</p>
                <input type="email" id="admin-email" placeholder="Admin Email">
                <input type="password" id="admin-pass" placeholder="Password">
                <button class="action-btn btn-primary" onclick="loginAdmin()">Sign In</button>
            </div>

            <div id="admin-controls-ui" class="admin-controls">
                <div style="margin-bottom: 2rem;">
                    <h3 style="margin-bottom: 1rem;">Poll Status</h3>
                    <button id="toggle-lock-btn" class="action-btn btn-danger" onclick="toggleLock()">
                        🔒 Lock Voting
                    </button>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 1rem 0;">
                
                <div>
                    <h3 style="margin-bottom: 1rem;">Danger Zone</h3>
                    <button class="action-btn btn-danger" style="background: #000;" onclick="resetPoll()">
                        ⚠️ Reset Poll (Clear All Votes)
                    </button>
                </div>

                <div style="margin-top: 2rem;">
                    <button class="action-btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;" onclick="logoutAdmin()">
                        Log Out
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Custom Toast Message -->
    <div id="toast">Message goes here</div>

    <!-- Application Logic -->
    <script>
        const SUPABASE_URL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let pollIsLocked = false;
        let isAdmin = false;

        async function initAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) {
                    currentUser = session.user;
                    if (currentUser.email) {
                        isAdmin = true;
                    } else {
                        isAdmin = false;
                    }
                } else {
                    isAdmin = false;
                }
                
                fetchInitialData();
                setupRealtimeSubscriptions();

            } catch (error) {
                console.error("Auth error:", error);
                showToast("Authentication failed. Check console.");
            }
        }

        async function fetchInitialData() {
            const { data: configData } = await supabaseClient
                .from('poll_config')
                .select('is_locked')
                .eq('id', 'main')
                .single();
            
            if (configData) {
                pollIsLocked = configData.is_locked;
            }

            updateAdminUI();
        }

        function setupRealtimeSubscriptions() {
            supabaseClient
                .channel('poll-config-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'poll_config' }, payload => {
                    if (payload.new && payload.new.is_locked !== undefined) {
                        pollIsLocked = payload.new.is_locked;
                        updateAdminUI();
                    }
                })
                .subscribe();
        }

        function updateAdminUI() {
            const lockBtn = document.getElementById('toggle-lock-btn');
            if (pollIsLocked) {
                lockBtn.className = 'action-btn btn-success';
                lockBtn.innerText = '🔓 Unlock Voting';
            } else {
                lockBtn.className = 'action-btn btn-danger';
                lockBtn.innerText = '🔒 Lock Voting';
            }

            if (isAdmin) {
                document.getElementById('admin-login-ui').style.display = 'none';
                document.getElementById('admin-controls-ui').style.display = 'flex';
            } else {
                document.getElementById('admin-login-ui').style.display = 'flex';
                document.getElementById('admin-controls-ui').style.display = 'none';
            }
        }

        window.loginAdmin = async function() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;

            if (!email || !pass) return showToast("Please enter an email and password.");

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) throw error;

                currentUser = data.user;
                isAdmin = true;
                showToast("Admin logged in successfully.");
                fetchInitialData();
            } catch (error) {
                showToast("Login failed: " + error.message);
            }
        }

        window.logoutAdmin = async function() {
            try {
                await supabaseClient.auth.signOut();
                isAdmin = false;
                currentUser = null;
                document.getElementById('admin-email').value = '';
                document.getElementById('admin-pass').value = '';
                showToast("Admin logged out.");
                updateAdminUI();
            } catch (error) {
                showToast("Error logging out.");
            }
        }

        window.toggleLock = async function() {
            if (!isAdmin || !currentUser) return;
            try {
                const { error } = await supabaseClient
                    .from('poll_config')
                    .update({ is_locked: !pollIsLocked })
                    .eq('id', 'main');
                    
                if (error) throw error;
            } catch (error) {
                showToast("Error updating status. Check RLS policies.");
            }
        }

        window.resetPoll = async function() {
            if (!isAdmin || !currentUser) return;
            try {
                const { error: deleteError } = await supabaseClient
                    .from('votes')
                    .delete()
                    .neq('user_id', '00000000-0000-0000-0000-000000000000');
                    
                if (deleteError) throw deleteError;

                const { error: unlockError } = await supabaseClient
                    .from('poll_config')
                    .update({ is_locked: false })
                    .eq('id', 'main');
                    
                if (unlockError) throw unlockError;

                showToast("Poll reset successfully!");
            } catch (error) {
                showToast("Error resetting poll. Check RLS policies.");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        initAuth();
    </script>
</body>
</html>
