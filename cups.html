<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ANHS Live Polling - Cups</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div id="full-page" style="display: none; text-align: center;">
            <div>
                <div id="cups-status-badge" class="status-badge status-locked">Waiting...</div>
            </div>

            <!-- Active round: pick a cup -->
            <div id="cups-pick" style="display: none;">
                <h1 style="margin-top: 1rem;">Pick a cup!</h1>
                <div id="cups-buttons" style="display: flex; justify-content: center; gap: 2rem; margin-top: 2rem;">
                    <button class="cups-btn" id="cups-btn-1" onclick="pressCup(1)">1</button>
                    <button class="cups-btn" id="cups-btn-2" onclick="pressCup(2)">2</button>
                    <button class="cups-btn" id="cups-btn-3" onclick="pressCup(3)">3</button>
                </div>
            </div>

            <!-- Game not active, no prior press -->
            <div id="cups-inactive" style="display: none; margin-top: 2rem;">
                <p style="font-size: 1.2rem; color: var(--text-muted);">This game isn't active right now.</p>
            </div>

            <!-- Result screen (shown after submitting) -->
            <div id="cups-result" style="display: none; margin-top: 2rem;">
                <!-- Filled dynamically by updateCupsUI() -->
            </div>
        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="common.js"></script>
    </body>
</html>
