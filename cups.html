<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ANHS Live - Cups</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="firebase-config.js"></script>

        <link rel="stylesheet" href="style.css?v=3">
    </head>
    <body>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header: status + title -->
            <div class="page-header">
                <div id="cups-status-badge" class="status-badge status-locked">Waiting...</div>
                <h1>Cups</h1>
                <h2>Pick the right cup!</h2>
            </div>

            <!-- Content: game states -->
            <div class="content-panel" style="text-align: center;">

                <!-- Active round: pick a cup -->
                <div id="cups-pick" style="display: none;">
                    <div id="cups-buttons" style="display: flex; justify-content: center; gap: 2rem; margin-top: 1rem;">
                        <button class="cups-btn" id="cups-btn-1" onclick="pressCup(1)">1</button>
                        <button class="cups-btn" id="cups-btn-2" onclick="pressCup(2)">2</button>
                        <button class="cups-btn" id="cups-btn-3" onclick="pressCup(3)">3</button>
                    </div>
                </div>

                <!-- Game not active -->
                <div id="cups-inactive" style="display: none; padding: 2rem 0;">
                    <p style="font-size: 1.2rem; color: var(--text-muted);">This game isn't active right now.</p>
                </div>

                <!-- Result screen (filled dynamically) -->
                <div id="cups-result" style="display: none; padding: 1rem 0;">
                </div>

                <!-- Leaderboard -->
                <div id="cups-leaderboard" style="display: none; margin-top: 2rem; padding: 1rem 0;">
                    <h3>Leaderboard</h3>
                    <div id="cups-leaderboard-list" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
                    </div>
                </div>

            </div>

        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Application Logic -->
        <script src="common.js"></script>
    </body>
</html>
