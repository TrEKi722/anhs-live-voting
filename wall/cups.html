<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wall — Cups</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="../firebase-config.js"></script>

        <link rel="stylesheet" href="../style.css?v=3">
    </head>
    <body>

        <!-- Fullscreen video player -->
        <video id="cupsVideo" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; z-index: 1000;" controls></video>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header: status + title + domain -->
            <div class="page-header">
                <div id="cups-wall-badge" class="status-badge status-locked">Loading...</div>
                <h1>Pick the right cup!</h1>
                <h2 id="playNow"></h2>
            </div>

            <!-- Body: QR + live state -->
            <div class="wall-body">
                <div class="wall-qr-panel">
                    <img src="" id="qr" alt="QR to cups game" style="width: 400px; height: 400px; border-radius: 8px;">
                </div>
                <div class="content-panel" style="text-align: center;">
                    <div id="cups-wall-inactive" style="padding: 2rem 0; color: var(--text-muted); font-size: 1.3rem;">
                        Waiting for round to start...
                    </div>
                    <div id="cups-wall-active" style="display: none; padding: 2rem 0;">
                        <p style="font-size: 1.2rem; color: var(--text-muted);">Round is live — pick fast!</p>
                        <div style="font-size: 5rem; font-weight: bold; margin: 1rem 0;" id="cups-wall-count">0</div>
                        <p style="color: var(--text-muted); font-size: 1.1rem;">correct guesses so far</p>
                    </div>
                </div>
            </div>

        </div>

        <script src="../common.js"></script>
        <script>
            let cupsVideoUrl = '/media/cups-video.mp4'; // Update with actual video path

            addEventListener("DOMContentLoaded", () => {
                document.getElementById('playNow').textContent = 'Play @ ' + window.location.hostname;
                document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2F' + window.location.hostname + '%2Fcups&size=500x500&color=000&bgcolor=fff&qzone=1';

                // Setup video player
                const videoEl = document.getElementById('cupsVideo');
                videoEl.src = cupsVideoUrl;
                videoEl.addEventListener('ended', hideVideo);
            });

            function showVideo() {
                const videoEl = document.getElementById('cupsVideo');
                videoEl.style.display = 'block';
                videoEl.currentTime = 0;
                videoEl.play();
            }

            function hideVideo() {
                const videoEl = document.getElementById('cupsVideo');
                videoEl.style.display = 'none';
                videoEl.pause();
            }

            // Hook into the wall cups UI update
            const origUpdateWallCupsUI = window.updateWallCupsUI;
            window.updateWallCupsUI = function() {
                if (origUpdateWallCupsUI) origUpdateWallCupsUI();

                // Show video when round starts
                if (cupsIsActive && cupsMyPress === null) {
                    showVideo();
                } else {
                    hideVideo();
                }
            };
        </script>
    </body>
</html>
