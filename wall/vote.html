<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wall — Vote</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="../style.css">
    </head>
    <body>

        <div id="full-page" class="wall-page" style="display: none;">

            <!-- Header: status + domain + question -->
            <div class="wall-header">
                <div id="locked-status-badge" class="status-badge status-open">Loading status...</div>
                <h1 id="voteNow">Vote now @ *domain*</h1>
                <h2 id="question">Loading...</h2>
            </div>

            <!-- Body: QR + live chart -->
            <div class="wall-body">
                <div class="wall-qr-panel">
                    <img src="" id="qr" alt="QR to voting site" style="width: 400px; height: 400px; border-radius: 8px;">
                </div>
                <div class="wall-content-panel" id="live-chart">
                    <div class="bar-group">
                        <div class="bar-label"><span id="option0">FRESHMEN</span> <span id="pct-0">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
                    </div>
                    <div class="bar-group">
                        <div class="bar-label"><span id="option1">SOPHOMORES</span> <span id="pct-1">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
                    </div>
                    <div class="bar-group">
                        <div class="bar-label"><span id="option2">JUNIORS</span> <span id="pct-2">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
                    </div>
                    <div class="bar-group">
                        <div class="bar-label"><span id="option3">SENIORS</span> <span id="pct-3">0%</span></div>
                        <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
                    </div>
                    <div class="total-participants">
                        Total Votes: <span id="total-count">0</span>
                    </div>
                </div>
            </div>

        </div>

        <script src="../common.js"></script>
        <script>
            addEventListener("DOMContentLoaded", () => {
                document.getElementById('voteNow').textContent = 'Vote now @ ' + window.location.hostname;
                document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2F' + window.location.hostname + '&size=500x500&color=000&bgcolor=fff&qzone=1';
            });
        </script>
    </body>
</html>
