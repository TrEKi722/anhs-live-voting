<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wall — Name Game</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="../style.css">
    </head>
    <body>

        <div id="full-page" style="display: none; flex-direction: column; padding: 2rem; min-height: 100vh; box-sizing: border-box;">

            <!-- Header row: badge + title + QR -->
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; gap: 2rem;">
                <div style="flex: 1;">
                    <div id="ng-wall-badge" class="status-badge status-locked" style="margin-bottom: 0.75rem;">Loading...</div>
                    <h2 id="playNow" style="margin: 0; font-size: 1.4rem;"></h2>

                    <!-- Shared timer bar (shown during memorize + recall) -->
                    <div id="ng-wall-timer-section" style="display: none; margin-top: 0.75rem;">
                        <div class="ng-timer-track">
                            <div id="ng-wall-timer-bar" class="ng-timer-bar"></div>
                        </div>
                        <div id="ng-wall-timer-text" style="font-size: 1.5rem; font-weight: bold; margin-top: 0.25rem;"></div>
                    </div>
                </div>
                <img src="" id="qr" alt="QR to name game" style="width: 160px; height: 160px; flex-shrink: 0;">
            </div>

            <!-- Idle -->
            <div id="ng-wall-idle" style="text-align: center; padding: 3rem 0; color: var(--text-muted); font-size: 1.3rem;">
                Waiting for round to start...
            </div>

            <!-- Memorize: full image grid -->
            <div id="ng-wall-memorize" style="display: none;">
                <div id="ng-wall-memorize-grid" class="ng-image-grid ng-wall-grid"></div>
            </div>

            <!-- Recall: live leaderboard -->
            <div id="ng-wall-recall" style="display: none;">
                <table id="ng-wall-leaderboard" style="width: 100%; border-collapse: collapse; font-size: 1.4rem;"></table>
            </div>

            <!-- Done: same leaderboard, different header (badge handles the messaging) -->
            <div id="ng-wall-done" style="display: none;">
                <table id="ng-wall-done-leaderboard" style="width: 100%; border-collapse: collapse; font-size: 1.4rem;"></table>
            </div>

        </div>

        <script src="../name-game-data.js"></script>
        <script src="../common.js"></script>
        <script>
            addEventListener("DOMContentLoaded", () => {
                document.getElementById('playNow').textContent = 'Play @ ' + window.location.hostname;
                document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2F' + window.location.hostname + '%2Fname-game&size=500x500&color=000&bgcolor=fff&qzone=1';
            });
        </script>
    </body>
</html>
