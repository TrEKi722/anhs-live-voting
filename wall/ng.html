<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wall — Name Game</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="../firebase-config.js"></script>

        <link rel="stylesheet" href="../style.css?v=3">
    </head>
    <body>

        <div id="full-page" class="page-layout" style="display: none;">

            <!-- Header: status + domain + timer -->
            <div class="page-header">
                <div id="ng-wall-badge" class="status-badge status-locked">Loading...</div>
                <h1 id="playNow"></h1>
                <div id="ng-wall-timer-section" style="display: none; margin-top: 0.75rem; max-width: 480px; margin-left: auto; margin-right: auto;">
                    <div class="ng-timer-track">
                        <div id="ng-wall-timer-bar" class="ng-timer-bar"></div>
                    </div>
                    <div id="ng-wall-timer-text" style="font-size: 1.5rem; font-weight: bold; margin-top: 0.25rem;"></div>
                </div>
            </div>

            <!-- Body: QR + game content -->
            <div class="wall-body">
                <div class="wall-qr-panel">
                    <img src="" id="qr" alt="QR to name game" style="width: 400px; height: 400px; border-radius: 8px; flex-shrink: 0;">
                </div>
                <div class="content-panel">

                    <!-- Idle -->
                    <div id="ng-wall-idle" style="text-align: center; padding: 3rem 0; color: var(--text-muted); font-size: 1.3rem;">
                        Waiting for round to start...
                    </div>

                    <!-- Memorize: full image grid -->
                    <div id="ng-wall-memorize" style="display: none;">
                        <div id="ng-wall-memorize-grid" class="ng-image-grid ng-wall-grid"></div>
                    </div>

                    <!-- Recall: live leaderboard -->
                    <div id="ng-wall-recall" style="display: none;">
                        <table id="ng-wall-leaderboard" style="width: 100%; border-collapse: collapse; font-size: 1.4rem;"></table>
                    </div>

                    <!-- Done: final leaderboard -->
                    <div id="ng-wall-done" style="display: none;">
                        <table id="ng-wall-done-leaderboard" style="width: 100%; border-collapse: collapse; font-size: 1.4rem;"></table>
                    </div>

                </div>
            </div>

        </div>

        <script src="../name-game-data.js"></script>
        <script src="../common.js"></script>
        <script>
            addEventListener("DOMContentLoaded", () => {
                document.getElementById('playNow').textContent = 'Play @ ' + window.location.hostname;
                document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2F' + window.location.hostname + '%2Fname-game&size=500x500&color=000&bgcolor=fff&qzone=1';
            });
        </script>
    </body>
</html>
