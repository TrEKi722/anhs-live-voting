<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wall — Yearbook</title>
        <link rel="icon" type="image/x-icon" href="https://bell-circle.com/favicon.ico">

        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <link rel="stylesheet" href="../style.css">
    </head>
    <body>

        <div id="full-page" class="wall-page" style="display: none;">

            <!-- Header: status + title + domain -->
            <div class="wall-header">
                <span id="yb-wall-badge" class="status-badge status-locked">Loading...</span>
                <h1>Guess That Teacher!</h1>
                <h2 id="yb-play-url"></h2>
            </div>

            <!-- Body: QR + game content -->
            <div class="wall-body">
                <div class="wall-qr-panel">
                    <img id="yb-qr" src="" alt="QR code to yearbook game" style="width: 400px; height: 400px; border-radius: 8px;">
                </div>
                <div class="wall-content-panel" style="text-align: center;">

                    <!-- Phase: waiting -->
                    <div id="yb-wall-waiting" style="padding: 2rem 0;">
                        <p style="color: var(--text-muted); font-size: 1.2rem;">Scan the QR code to play!</p>
                    </div>

                    <!-- Phase: guessing -->
                    <div id="yb-wall-guessing" style="display: none;">
                        <h2 style="margin-bottom: 0.75rem;">Who is this?</h2>
                        <img id="yb-wall-throwback" src="" alt="Throwback photo" class="yb-wall-throwback">
                        <div id="yb-wall-options" class="yb-wall-options-grid"></div>
                    </div>

                    <!-- Phase: reveal -->
                    <div id="yb-wall-reveal" style="display: none;">
                        <h2 id="yb-wall-reveal-name" style="font-size: 2rem; margin: 0 0 0.5rem;"></h2>
                        <div class="yb-wall-reveal-photos">
                            <div class="yb-wall-reveal-photo">
                                <img id="yb-wall-reveal-throwback" src="" alt="Then">
                                <p>Then</p>
                            </div>
                            <div class="yb-wall-reveal-photo">
                                <img id="yb-wall-reveal-current" src="" alt="Now">
                                <p>Now</p>
                            </div>
                        </div>
                        <h3 style="margin-top: 1.25rem; margin-bottom: 0.5rem;">Leaderboard</h3>
                        <table class="yb-leaderboard" style="max-width: 400px; margin: 0 auto;">
                            <tbody id="yb-wall-leaderboard">
                                <tr><td colspan="3" style="color:var(--text-muted);text-align:center;padding:1rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>

        <!-- Custom Toast Message -->
        <div id="toast">Message goes here</div>

        <!-- Data + Logic -->
        <script src="../yearbook-data.js"></script>
        <script src="../common.js"></script>
        <script>
            addEventListener("DOMContentLoaded", () => {
                const host = window.location.hostname;
                document.getElementById('yb-play-url').textContent = 'Play @ ' + host;
                document.getElementById('yb-qr').src =
                    'https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2F' +
                    host + '%2Fyearbook&size=500x500&color=000&bgcolor=fff&qzone=1';
            });
        </script>
    </body>
</html>
