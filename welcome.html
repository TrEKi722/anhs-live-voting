<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Change your password</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--muted:#6b7280;--brand:#0b5fff;--danger:#dc2626}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:var(--bg); margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
    .card{width:100%;max-width:520px;background:var(--card);padding:28px;border-radius:12px;box-shadow:0 6px 24px rgba(16,24,40,0.06)}
    h1{margin:0 0 6px;font-size:20px}
    p.lead{margin:0 0 18px;color:var(--muted)}
    .status{padding:10px 12px;border-radius:8px;margin-bottom:14px;display:none}
    .status.ok{background:#ecfdf5;color:#065f46;border:1px solid #bbf7d0;display:block}
    .status.err{background:#fff1f2;color:var(--danger);border:1px solid #fecaca;display:block}
    form{display:flex;flex-direction:column;gap:12px}
    label{font-size:13px;color:#0f172a}
    input[type="password"]{padding:10px 12px;border-radius:8px;border:1px solid #e6eef8;background:#fbfdff;font-size:15px}
    .btn{background:var(--brand);color:white;padding:10px 14px;border-radius:10px;border:none;font-weight:600;cursor:pointer}
    .btn[disabled]{opacity:0.6;cursor:not-allowed}
    .link{background:transparent;color:var(--brand);border:1px solid rgba(11,95,255,0.12);padding:8px 12px;border-radius:8px;cursor:pointer}
    .small{font-size:13px;color:var(--muted);text-align:center;margin-top:12px}
    .debug{font-family:monospace;font-size:12px;color:#334155;background:#f8fafc;padding:8px;border-radius:8px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Change your password</h1>
    <p class="lead">Enter a new password to finish resetting your account.</p>

    <div id="status" class="status"></div>

    <form id="pwForm" style="display:none;">
      <div>
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
      </div>
      <div>
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" placeholder="Repeat the password" />
      </div>

      <div style="display:flex;gap:12px;align-items:center;margin-top:6px">
        <button id="submitBtn" class="btn" type="button">Set password</button>
        <button id="cancelBtn" class="link" type="button">Cancel</button>
      </div>
    </form>

    <div id="fallback" style="display:none;">
      <p class="small">If this link didn't work, request a password reset again from the app or contact support.</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
        <a id="signinLink" class="btn" href="/admin" style="text-decoration:none;display:inline-block">Go to sign in</a>
      </div>
    </div>

    <div id="debug" class="debug" aria-hidden="true"></div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Replace these with your project's values
    const SUPABASE_URL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');
    const form = document.getElementById('pwForm');
    const pwInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const fallbackEl = document.getElementById('fallback');

    function showStatus(type, text) {
      statusEl.className = 'status ' + (type === 'ok' ? 'ok' : 'err');
      statusEl.textContent = text;
      statusEl.style.display = 'block';
    }
    function hideStatus() { statusEl.style.display = 'none'; }

    function showDebug(msg) {
      debugEl.style.display = 'block';
      debugEl.textContent = msg;
      debugEl.setAttribute('aria-hidden', 'false');
    }

    function validatePassword(pw, confirm) {
      if (!pw || pw.length < 8) return 'Password must be at least 8 characters.';
      if (pw !== confirm) return 'Passwords do not match.';
      return null;
    }

    async function setPassword(password) {
      submitBtn.disabled = true;
      try {
        const { data, error } = await supabase.auth.updateUser({ password });
        if (error) {
          console.warn('updateUser error', error);
          showStatus('err', 'Could not set password: ' + error.message);
          showDebug(JSON.stringify(error, null, 2));
          submitBtn.disabled = false;
          return;
        }
        showStatus('ok', 'Password updated. Redirecting to admin dashboard...');
        setTimeout(() => window.location.href = '/admin', 900);
      } catch (err) {
        console.error(err);
        showStatus('err', 'Unexpected error while setting password.');
        showDebug(String(err));
        submitBtn.disabled = false;
      }
    }

    // Helper: parse fragment (after #) into an object
    function parseFragment(fragment) {
      if (!fragment) return {};
      const q = fragment.startsWith('#') ? fragment.slice(1) : fragment;
      return Object.fromEntries(new URLSearchParams(q));
    }

    // Helper: parse query string
    function parseQuery(qs) {
      const q = qs.startsWith('?') ? qs.slice(1) : qs;
      return Object.fromEntries(new URLSearchParams(q));
    }

    async function initFromRedirect() {
      showStatus('ok', 'Processing reset link…');
      try {
        const url = new URL(window.location.href);
        const fragment = parseFragment(url.hash);
        const query = parseQuery(url.search);

        // 1) If access_token present in fragment -> set session
        if (fragment.access_token) {
          const access_token = fragment.access_token;
          const refresh_token = fragment.refresh_token || null;
          // set session directly
          const { data, error } = await supabase.auth.setSession({ access_token, refresh_token });
          if (error) {
            console.warn('setSession error', error);
            showStatus('err', 'Invalid or expired link: ' + (error.message || 'please request a new reset email.'));
            showDebug(JSON.stringify(error, null, 2));
            fallbackEl.style.display = 'block';
            return;
          }
          // success: show form
          hideStatus();
          form.style.display = 'block';
          return;
        }

        // 2) PKCE/token_hash flow (token_hash & type in query)
        if (query.token_hash && query.type) {
          const { token_hash, type } = query;
          // verifyOtp exchanges the token_hash for a session
          const { data, error } = await supabase.auth.verifyOtp({ token_hash, type });
          if (error) {
            console.warn('verifyOtp error', error);
            showStatus('err', 'Invalid or expired link: ' + (error.message || 'please request a new reset email.'));
            showDebug(JSON.stringify(error, null, 2));
            fallbackEl.style.display = 'block';
            return;
          }
          // success: show form
          hideStatus();
          form.style.display = 'block';
          return;
        }

        // 3) No usable tokens
        showStatus('err', 'No valid auth token found in the link. Please request a new password reset.');
        fallbackEl.style.display = 'block';
      } catch (err) {
        console.error(err);
        showStatus('err', 'Unexpected error while processing the link.');
        showDebug(String(err));
        fallbackEl.style.display = 'block';
      }
    }

    submitBtn.addEventListener('click', async () => {
      const pw = pwInput.value.trim();
      const confirm = confirmInput.value.trim();
      const v = validatePassword(pw, confirm);
      if (v) { showStatus('err', v); return; }
      hideStatus();
      await setPassword(pw);
    });

    cancelBtn.addEventListener('click', () => {
      window.location.href = '/';
    });

    // Run on load
    initFromRedirect();
  </script>
</body>
</html>
