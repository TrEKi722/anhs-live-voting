<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>

        <!-- Cloudflare Turnstile -->
        <link rel="preconnect" href="https://challenges.cloudflare.com">
        <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer
        ></script>
    </head>
    <body>
        <h1>Reset Password</h1>
        <form id="resetForm">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAACp4ciLpxF9JPdqQ"
            data-theme="light"
            data-size="normal"
            data-callback="handleResetCaptcha"
            ></div>
            <button class="action-btn btn-secondary" type="submit" id="submitBtn" disabled>Send Reset Email</button>
        </form>
        <p style="display: none;">You will be redirected to the vote page in 5 seconds...</p>
        <div id="toast">Message goes here</div>
        <script>

            const supabaseURL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';
            const supabaseRP = window.supabase.createClient(supabaseURL, supabaseKey);
            
            let captchaToken = null;
            
            // Handle captcha completion
            window.handleResetCaptcha = function(token) {
                captchaToken = token;
                document.getElementById('submitBtn').disabled = false;
            }

            document.getElementById('resetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Validate captcha was completed
                if (!captchaToken) {
                    showToast('Please complete the captcha');
                    return;
                }
                
                const email = document.getElementById('email').value;
                
                if (!email) {
                    showToast('Please enter an email address');
                    return;
                }
                
                try {
                    const { error } = await supabaseRP.auth.resetPasswordForEmail(email, {
                        captchaToken: captchaToken
                    });
                    
                    if (error) {
                        showToast('Error: ' + error.message);
                    } else {
                        showToast('Password reset email sent!\nMake sure to check your inbox and spam folder.\nAdd anhs@bell-circle.com to your contacts to ensure delivery.');
                        document.querySelector('p').style.display = 'block';
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 5000);
                    }
                } catch (err) {
                    showToast('Error: ' + err.message);
                }
                
                // Reset captcha after attempt
                captchaToken = null;
                document.getElementById('submitBtn').disabled = true;
                if (window.turnstile) {
                    window.turnstile.reset();
                }
            });
        </script>
    </body>
</html>
