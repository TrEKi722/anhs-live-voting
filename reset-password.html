<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Reset Password</h1>
        <form id="resetForm">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <button type="submit">Send Reset Email</button>
        </form>
        <div id="toast">Message goes here</div>
        <script>
            const SUPABASE_URL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            document.getElementById('resetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const { error } = await supabase.auth.resetPasswordForEmail(email);
                if (error) {
                    showToast('Error: ' + error.message);
                } else {
                    showToast('Password reset email sent!\nMake sure to check your inbox and spam folder.\nAdd anhs@bell-circle.com to your contacts to ensure delivery.');
                }
            });
        </script>
    </body>
</html>
