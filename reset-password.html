<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
        <script src="firebase-config.js"></script>
        <link rel="stylesheet" href="style.css?v=3">

        <!-- reCAPTCHA v2 invisible -->
        <link rel="preconnect" href="https://www.google.com">
        <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    </head>
    <body>
        <h1>Reset Password</h1>
        <form id="resetForm">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <div id="reset-recaptcha-container"></div>
            <button class="action-btn btn-secondary" type="submit" id="submitBtn">Send Reset Email</button>
        </form>
        <p style="display: none;">You will be redirected to the vote page in 5 seconds...</p>
        <div id="toast">Message goes here</div>
        <script>
            const fns = window._fns || firebase.app().functions('us-central1');
            let resetWidgetId = null;
            let resetResolve = null;

            function showToast(message) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.innerText = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function getResetRecaptchaToken() {
                return new Promise((resolve) => {
                    resetResolve = resolve;
                    grecaptcha.execute(resetWidgetId);
                });
            }

            window.resetRecaptchaComplete = function(token) {
                if (resetResolve) {
                    resetResolve(token);
                    resetResolve = null;
                }
            };

            window.addEventListener('load', () => {
                grecaptcha.ready(() => {
                    resetWidgetId = grecaptcha.render('reset-recaptcha-container', {
                        sitekey: '6LdHwsYsAAAAAAPo5oL0Yl5BAHuRoQPSFek9svoh',
                        size: 'invisible',
                        callback: resetRecaptchaComplete,
                    });
                });
            });

            document.getElementById('resetForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                if (!email) { showToast('Please enter an email address'); return; }

                try {
                    const recaptchaToken = await getResetRecaptchaToken();
                    await fns.httpsCallable('adminSendPasswordReset')({ email, recaptchaToken });
                    showToast('Password reset email sent!\nMake sure to check your inbox and spam folder.\nAdd anhs@bell-circle.com to your contacts to ensure delivery.');
                    document.querySelector('p').style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 5000);
                } catch (err) {
                    showToast('Error: ' + err.message);
                    grecaptcha.reset(resetWidgetId);
                }
            });
        </script>
    </body>
</html>
