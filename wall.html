<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Live Polling Results</title>
        
        <!-- Supabase SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        
        <link rel="stylesheet" href="style.css">

        <!-- Cloudflare Turnstile -->
        <link rel="preconnect" href="https://challenges.cloudflare.com">
        <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer
        ></script>
    </head>
    <body>
         
        <div id="turnstile-container" style="display: block; text-align: center; margin-top: 50px;">
            <h2>Please complete the CAPTCHA to continue</h2>
            <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAACp4ciLpxF9JPdqQ"
            data-theme="light"
            data-size="normal"
            data-callback="initAuth"
            ></div>
        </div>

        <div id="full-page" style="display: none;">
            <div style="text-align: center;">
                <div id="vote-status-badge" class="status-badge status-open">Loading status...</div>
            </div>
            <h1>Vote now @ anhs-live-voting.pages.dev</h1>
            <h1 id="question">Loading...</h1>
            <div class="chart-container" id="live-chart">
                <div class="bar-group">
                    <div class="bar-label"><span id="option0">FRESHMEN</span> <span id="pct-0">0%</span></div>
                    <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
                </div>
                <div class="bar-group">
                    <div class="bar-label"><span id="option1">SOPHOMORES</span> <span id="pct-1">0%</span></div>
                    <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
                </div>
                <div class="bar-group">
                    <div class="bar-label"><span id="option2">JUNIORS</span> <span id="pct-2">0%</span></div>
                    <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
                </div>
                <div class="bar-group">
                    <div class="bar-label"><span id="option3">SENIORS</span> <span id="pct-3">0%</span></div>
                    <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
                </div>
                
                <div class="total-participants">
                    Total Votes: <span id="total-count">0</span>
                </div>
            </div>
            <h1 id="hiddenText" style="display:none;">🙈 RESULTS HIDDEN 🙈</h1>

            <img src="./media/pagesQR.png" alt="QR to voting site" margin-top: 20px;">
        </div>

        <!-- Application Logic -->
        <script src="script.js"></script>
    </body>
</html>
