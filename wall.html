<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Polling Results</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #4f46e5;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem;
            align-items: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #111;
            font-size: 2.5rem;
        }

        /* Projector Page Styles */
        .chart-container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .bar-group {
            margin-bottom: 2rem;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .bar-track {
            background: #e5e7eb;
            height: 32px;
            border-radius: 16px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
        }

        .total-participants {
            text-align: center;
            margin-top: 3rem;
            font-size: 1.75rem;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>
    
    <h1>Live Results</h1>
    <div class="chart-container">
        <div class="bar-group">
            <div class="bar-label"><span>FRESHMEN</span> <span id="pct-0">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-0"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>SOPHOMORES</span> <span id="pct-1">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-1"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>JUNIORS</span> <span id="pct-2">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-2"></div></div>
        </div>
        <div class="bar-group">
            <div class="bar-label"><span>SENIORS</span> <span id="pct-3">0%</span></div>
            <div class="bar-track"><div class="bar-fill" id="bar-3"></div></div>
        </div>
        
        <div class="total-participants">
            Total Votes: <span id="total-count">0</span>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const SUPABASE_URL = 'https://ntzxejhhxtzdyyeqbfpn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50enhlamhoeHR6ZHl5ZXFiZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjMsImV4cCI6MjA4ODgzMDMyM30.0oh9mGajdP5tVibXjk5fp1acviBq-LUCkauE3m1c6_0';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fetch the initial tallies when the page loads
        async function fetchAndUpdateAllVotes() {
            const { data: votes, error } = await supabaseClient
                .from('votes')
                .select('option_index');

            if (error) {
                console.error("Error fetching votes:", error);
                return;
            }

            let voteCounts = [0, 0, 0, 0];
            let totalVotes = 0;

            if (votes) {
                votes.forEach(v => {
                    if (v.option_index >= 0 && v.option_index <= 3) {
                        voteCounts[v.option_index]++;
                        totalVotes++;
                    }
                });
            }

            updateProjectorUI(voteCounts, totalVotes);
        }

        // Listen for any new votes (or resets) happening in real-time
        function setupRealtimeSubscriptions() {
            supabaseClient
                .channel('votes-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, payload => {
                    console.log('Votes changed, updating totals...');
                    fetchAndUpdateAllVotes();
                })
                .subscribe();
        }

        // Animate the bars and update text
        function updateProjectorUI(counts, total) {
            document.getElementById('total-count').innerText = total;

            counts.forEach((count, index) => {
                const percentage = total === 0 ? 0 : Math.round((count / total) * 100);
                document.getElementById(`bar-${index}`).style.width = `${percentage}%`;
                document.getElementById(`pct-${index}`).innerText = `${percentage}% (${count})`;
            });
        }

        // Start the application
        fetchAndUpdateAllVotes();
        setupRealtimeSubscriptions();
    </script>
</body>
</html>
